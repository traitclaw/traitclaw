[package]
name = "miniclaw"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
baseclaw = { path = "../../crates/baseclaw" }
baseclaw-openai-compat = { path = "../../crates/baseclaw-openai-compat" }
baseclaw-steering = { path = "../../crates/baseclaw-steering" }
baseclaw-memory-sqlite = { path = "../../crates/baseclaw-memory-sqlite" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
async-trait = "0.1"
schemars = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
