[package]
name = "miniclaw"
version = "0.6.0"
edition = "2021"
publish = false

[dependencies]
traitclaw = { path = "../../crates/traitclaw" }
traitclaw-openai-compat = { path = "../../crates/traitclaw-openai-compat" }
traitclaw-steering = { path = "../../crates/traitclaw-steering" }
traitclaw-memory-sqlite = { path = "../../crates/traitclaw-memory-sqlite" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
async-trait = "0.1"
schemars = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
