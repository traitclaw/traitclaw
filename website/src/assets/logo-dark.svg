  <path d="M140 95 L162 108 L170 125" stroke="#e06c40" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M135 105 L152 120 L158 140" stroke="#e06c40" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  
  <!-- Circuit board pattern inside body -->
  <!-- Central chip -->
  <rect x="93" y="78" width="14" height="14" rx="2" fill="#e06c40"/>
  
  <!-- Circuit traces -->
  <line x1="100" y1="78" x2="100" y2="60" stroke="#e06c40" stroke-width="2"/>
  <circle cx="100" cy="58" r="3" fill="#e06c40"/>
  
  <line x1="100" y1="92" x2="100" y2="115" stroke="#e06c40" stroke-width="2"/>
  <circle cx="100" cy="115" r="3" fill="#e06c40"/>
  
  <line x1="93" y1="85" x2="75" y2="85" stroke="#e06c40" stroke-width="2"/>
  <circle cx="73" cy="85" r="3" fill="#e06c40"/>
  
  <line x1="107" y1="85" x2="125" y2="85" stroke="#e06c40" stroke-width="2"/>
  <circle cx="127" cy="85" r="3" fill="#e06c40"/>
  
  <!-- Diagonal traces -->
  <line x1="95" y1="80" x2="80" y2="68" stroke="#e06c40" stroke-width="1.5"/>
  <circle cx="78" cy="66" r="2.5" fill="#e06c40"/>
  
  <line x1="105" y1="80" x2="120" y2="68" stroke="#e06c40" stroke-width="1.5"/>
  <circle cx="122" cy="66" r="2.5" fill="#e06c40"/>
  
  <line x1="95" y1="90" x2="78" y2="100" stroke="#e06c40" stroke-width="1.5"/>
  <circle cx="76" cy="101" r="2.5" fill="#e06c40"/>
  
