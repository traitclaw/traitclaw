  <path d="M25 35 L35 28" stroke="#e06c40" stroke-width="4" stroke-linecap="round" fill="none"/>
  
  <!-- Right claw -->
  <path d="M140 75 L165 55 L175 35" stroke="#e06c40" stroke-width="4" stroke-linecap="round" fill="none"/>
