  <path d="M60 95 L38 108 L30 125" stroke="#e06c40" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M65 105 L48 120 L42 140" stroke="#e06c40" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  
