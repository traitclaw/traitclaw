name: Sync to Org

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Remove private content
        run: |
          git rm -r --cached _bmad-output/ 2>/dev/null || true
          git rm -r --cached _bmad/ 2>/dev/null || true
          git rm -r --cached .github/ 2>/dev/null || true

      - name: Create filtered commit preserving author
        run: |
          TREE=$(git write-tree)
          PARENT=$(git rev-parse HEAD)
          AUTHOR_NAME=$(git log -1 --format='%an')
          AUTHOR_EMAIL=$(git log -1 --format='%ae')
          COMMIT_MSG=$(git log -1 --format='%s')
          export GIT_AUTHOR_NAME="$AUTHOR_NAME"
          export GIT_AUTHOR_EMAIL="$AUTHOR_EMAIL"
          export GIT_COMMITTER_NAME="$AUTHOR_NAME"
          export GIT_COMMITTER_EMAIL="$AUTHOR_EMAIL"
          COMMIT=$(echo "$COMMIT_MSG" | git commit-tree "$TREE" -p "$PARENT")
          git update-ref refs/heads/filtered "$COMMIT"

      - name: Push to org repo
        env:
          ORG_TOKEN: ${{ secrets.ORG_SYNC_TOKEN }}
        run: |
          git remote add org https://x-access-token:${ORG_TOKEN}@github.com/traitclaw/traitclaw.git
          git push org filtered:main --force
